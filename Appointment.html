<html>
    <head>
        <title>Appointment</title>
        <link href="style.css" rel="stylesheet" type="text/css"/>
        <style>
            body {
                background-image: url('aulaad.png');
                background-repeat: no-repeat;
                background-position: center;
                background-attachment: fixed;
                font-family: Arial, sans-serif;
                margin: 20px;
                background-color: rgb(33, 33, 139);
                color: #e91e63;
            }
            
            h1, h2 {
                color: #0606060d;
            }
            p {
                font-size: 24px;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <h1>Book an Appointment</h1>
        <p>Welcome to the appointment booking page!<br> Please fill out the form below to schedule <br>an appointment with us.</p>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="date">Preferred Date:</label><br>
            <input type="date" id="date" name="date"><br><br>

            <label for="time">Preferred Time:</label><br>
            <input type="time" id="time" name="time"><br><br>

            <input type="submit" value="Book Appointment">
        </form>
</html>
